<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PChome Tracker V2</title>

  <link rel="manifest" href="./manifest.json">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 { margin-bottom: 20px; }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #0d6efd;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .ok { color: green; }
    .no { color: red; }
  </style>
</head>

<body>

  <h1>🛒 PChome Tracker V2</h1>

  <div class="input-box">
    <input id="url" placeholder="貼上 PChome 商品網址">
    <button id="addBtn">新增</button>
  </div>

  <div id="list"></div>

  <script type="module" src="./app.js"></script>

</body>
</html>
