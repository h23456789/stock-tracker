<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PChome Tracker V2</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .input-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #0d6efd;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0b5ed7;
    }

    .card {
      background: white;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .stock {
      font-weight: bold;
    }

    .ok {
      color: green;
    }

    .no {
      color: red;
    }

    a {
      color: #0d6efd;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1>🛒 PChome Tracker V2</h1>

  <!-- ✅ 改成正常 event，不用 onclick -->
  <div class="input-box">
    <input id="url" placeholder="貼上 PChome 商品網址">
    <button id="addBtn">新增</button>
  </div>

  <div id="list"></div>

  <!-- ⚠️ 一定要 module -->
  <script type="module" src="./app.js"></script>

  <!-- PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>

</body>
</html>
